<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">FreeWebPanel GitHub hero</title>
  <desc id="desc">Dark blue FreeWebPanel hero graphic with hosting panel dashboard preview and feature icons.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020813"/>
      <stop offset="0.52" stop-color="#061b35"/>
      <stop offset="1" stop-color="#00111f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1478ff"/>
      <stop offset="1" stop-color="#12d6ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#001225" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#12375f" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.45"/>
  <circle cx="1080" cy="190" r="220" fill="none" stroke="#168cff" stroke-width="2" opacity="0.25"/>
  <circle cx="1050" cy="190" r="150" fill="none" stroke="#2af7ff" stroke-width="1.5" opacity="0.18"/>
  <path d="M0 520C170 410 300 480 520 360C750 234 900 300 1280 130" fill="none" stroke="#126dff" stroke-width="4" opacity="0.18"/>

  <g transform="translate(66 66)">
    <path d="M0 42L62 6l62 36v72l-62 36L0 114z" fill="#fff" opacity="0.96"/>
    <path d="M32 58l30-17 30 17-30 17zM32 98l30-17 30 17-30 17z" fill="#071424"/>
    <text x="155" y="58" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="42" font-weight="800" fill="#fff">FreeWebPanel<tspan fill="#1e8cff">.com</tspan></text>
  </g>

  <g transform="translate(68 210)">
    <text x="0" y="0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="70" font-weight="900" fill="#fff">Free Web Panel</text>
    <text x="0" y="58" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="800" fill="#ffffff">Free &amp; Pro Linux Hosting Control Panel</text>
    <text x="0" y="108" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" fill="#c9d8e8">Manage websites, domains, email, databases, SSL, files, users, backups,</text>
    <text x="0" y="140" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" fill="#c9d8e8">updates, security, and customer hosting from one clean panel.</text>
  </g>

  <g transform="translate(70 415)" font-family="Inter,Segoe UI,Arial,sans-serif" fill="#dceeff">
    <g><circle cx="28" cy="24" r="24" fill="none" stroke="#188bff" stroke-width="4"/><path d="M8 24h40M28 4c10 12 10 28 0 40M28 4c-10 12-10 28 0 40" stroke="#188bff" stroke-width="3" fill="none"/><text x="0" y="72" font-size="15" font-weight="700">Domains</text></g>
    <g transform="translate(130 0)"><rect x="4" y="4" width="48" height="38" rx="6" fill="none" stroke="#188bff" stroke-width="4"/><path d="M18 55h20M28 42v13" stroke="#188bff" stroke-width="4"/><text x="0" y="72" font-size="15" font-weight="700">Websites</text></g>
    <g transform="translate(260 0)"><path d="M4 12h52v36H4zM6 14l24 18 24-18" fill="none" stroke="#188bff" stroke-width="4"/><text x="0" y="72" font-size="15" font-weight="700">Email</text></g>
    <g transform="translate(390 0)"><ellipse cx="30" cy="13" rx="28" ry="10" fill="none" stroke="#188bff" stroke-width="4"/><path d="M2 13v34c0 6 13 11 28 11s28-5 28-11V13" fill="none" stroke="#188bff" stroke-width="4"/><text x="0" y="72" font-size="15" font-weight="700">SQL</text></g>
    <g transform="translate(520 0)"><path d="M30 4l28 10v20c0 17-11 27-28 35C13 61 2 51 2 34V14z" fill="none" stroke="#188bff" stroke-width="4"/><path d="M17 34l9 9 18-22" fill="none" stroke="#5ee1ff" stroke-width="4"/><text x="0" y="72" font-size="15" font-weight="700">Security</text></g>
  </g>

  <g transform="translate(690 86) rotate(5)" filter="url(#shadow)">
    <rect x="0" y="0" width="500" height="365" rx="26" fill="url(#panel)"/>
    <rect x="0" y="0" width="96" height="365" rx="26" fill="#071424"/>
    <rect x="16" y="40" width="64" height="26" rx="8" fill="url(#blue)"/>
    <rect x="16" y="86" width="64" height="12" rx="6" fill="#27435f"/>
    <rect x="16" y="118" width="64" height="12" rx="6" fill="#27435f"/>
    <rect x="16" y="150" width="64" height="12" rx="6" fill="#27435f"/>
    <text x="122" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="850" fill="#0b1c30">Dashboard</text>
    <text x="122" y="90" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#60758d">Overview of your hosting account</text>
    <g transform="translate(122 126)">
      <rect width="82" height="62" rx="10" fill="#fff" stroke="#e0e9f2"/>
      <rect x="102" width="82" height="62" rx="10" fill="#fff" stroke="#e0e9f2"/>
      <rect x="204" width="82" height="62" rx="10" fill="#fff" stroke="#e0e9f2"/>
      <rect x="306" width="82" height="62" rx="10" fill="#fff" stroke="#e0e9f2"/>
      <text x="16" y="30" font-size="24" font-weight="800" font-family="Inter,Segoe UI,Arial" fill="#0b1c30">12</text>
      <text x="118" y="30" font-size="24" font-weight="800" font-family="Inter,Segoe UI,Arial" fill="#0b1c30">8</text>
      <text x="220" y="30" font-size="24" font-weight="800" font-family="Inter,Segoe UI,Arial" fill="#0b1c30">15</text>
      <text x="322" y="30" font-size="24" font-weight="800" font-family="Inter,Segoe UI,Arial" fill="#0b1c30">10</text>
      <text x="16" y="50" font-size="10" font-family="Inter,Segoe UI,Arial" fill="#6b7f95">Websites</text>
      <text x="118" y="50" font-size="10" font-family="Inter,Segoe UI,Arial" fill="#6b7f95">Domains</text>
      <text x="220" y="50" font-size="10" font-family="Inter,Segoe UI,Arial" fill="#6b7f95">Email</text>
      <text x="322" y="50" font-size="10" font-family="Inter,Segoe UI,Arial" fill="#6b7f95">SQL</text>
    </g>
    <rect x="122" y="216" width="222" height="80" rx="12" fill="#fff" stroke="#e0e9f2"/>
    <text x="140" y="246" font-size="14" font-weight="800" font-family="Inter,Segoe UI,Arial" fill="#0b1c30">Disk Usage</text>
    <rect x="140" y="262" width="170" height="8" rx="4" fill="#d8e6f2"/>
    <rect x="140" y="262" width="92" height="8" rx="4" fill="url(#blue)"/>
    <rect x="360" y="216" width="106" height="80" rx="12" fill="#fff" stroke="#e0e9f2"/>
    <text x="378" y="246" font-size="14" font-weight="800" font-family="Inter,Segoe UI,Arial" fill="#0b1c30">System</text>
    <text x="378" y="270" font-size="12" font-family="Inter,Segoe UI,Arial" fill="#6b7f95">Nginx</text>
  </g>

  <g transform="translate(70 550)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <rect width="190" height="44" rx="22" fill="url(#blue)"/>
    <text x="95" y="29" text-anchor="middle" font-size="18" font-weight="850" fill="#fff">100% Free Core</text>
    <text x="250" y="29" font-size="18" font-weight="700" fill="#dbe9ff">Pro support and licensing from freewebpanel.com</text>
  </g>
</svg>
